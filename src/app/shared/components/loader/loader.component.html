<!-- Overlay del loader -->
<div
  *ngIf="loadingState.isLoading"
  class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 backdrop-blur-sm"
>
  <!-- Card del loader -->
  <div
    class="bg-white rounded-3xl shadow-2xl p-8 flex flex-col items-center gap-6 max-w-sm mx-4 animate-bounce-subtle"
  >
    <!-- Emoji animado -->
    <div class="text-7xl animate-spin-slow">
      {{ currentEmoji }}
    </div>

    <!-- Spinner circular -->
    <div class="relative w-24 h-24">
      <div
        class="absolute inset-0 rounded-full border-4 border-sky-100 border-t-sky-500 animate-spin"
      ></div>
    </div>

    <!-- Texto principal -->
    <h2 class="text-center text-2xl font-bold text-slate-700">
      ¡Un momento! 🎉
    </h2>

    <!-- Mensaje personalizado -->
    <p class="text-center text-lg text-slate-600 font-medium">
      {{ loadingState.message }}
    </p>

    <!-- Puntos animados -->
    <div class="flex gap-2 items-center justify-center h-8">
      <span class="w-3 h-3 bg-sky-400 rounded-full animate-bounce" style="animation-delay: 0s"></span>
      <span class="w-3 h-3 bg-sky-500 rounded-full animate-bounce" style="animation-delay: 0.2s"></span>
      <span class="w-3 h-3 bg-sky-600 rounded-full animate-bounce" style="animation-delay: 0.4s"></span>
    </div>

    <!-- Barra de progreso (si está disponible) -->
    <div *ngIf="loadingState.progress !== undefined" class="w-full">
      <div class="bg-sky-100 rounded-full h-2">
        <div
          class="bg-gradient-to-r from-sky-400 to-sky-600 h-2 rounded-full transition-all duration-300"
          [style.width.%]="loadingState.progress"
        ></div>
      </div>
      <p class="text-center text-sm text-slate-500 mt-2">
        {{ loadingState.progress }}%
      </p>
    </div>
  </div>
</div>
